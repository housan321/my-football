name: Validate and Predict

on:
  schedule:
    # Run every day at 5:00 AM UTC - validates first, then predicts
    - cron: '0 6 * * *'
    
  # Allow manual triggering
  workflow_dispatch:

jobs:
  validate-and-predict:
    runs-on: ubuntu-latest
    
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true  # 👈 添加这一行
      API_KEY: ${{ secrets.API_KEY }}
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        fetch-depth: 0
        
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    # ==================== VALIDATION STEPS ====================
    - name: Run Validation Script
      run: python validate_predictions_netDB.py
    
    # ==================== PREDICTION STEPS ====================
    - name: Step 1 - Fetch Today's Matches
      run: python fetch_future.py
        
    - name: Step 2 - Extract Features
      run: python fetch_data.py
        
    - name: Step 3 - Generate Predictions
      run: python generate_predictions.py
    
    - name: Step 4 - Save Predictions to Database
      run: python new_save_netDB.py
        
    - name: Commit and push results
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        
        # THE FIX: Pull before pushing to avoid conflicts
        echo "🔄 Syncing with remote..."
        git pull --rebase origin main || git pull --rebase origin master || echo "Already up to date"
        
        # Add generated CSV files
        echo "📝 Adding prediction files..."
        git add -f live.csv extracted_features_complete.csv predictions_output.csv
        
        # Check if there are changes
        if git diff --staged --quiet; then
          echo "ℹ️ No changes to commit"
          exit 0
        fi
        
        # Commit changes
        echo "✅ Changes detected, committing..."
        git commit -m "🤖 Generated Predictions as boss wanted (-HAPI)"
        
        # Push with retry logic (5 attempts)
        max_retries=5
        retry_count=0
        
        while [ $retry_count -lt $max_retries ]; do
          retry_count=$((retry_count+1))
          echo "🔤 Push attempt $retry_count/$max_retries..."
          
          # Try main branch first
          if git push origin main 2>&1; then
            echo "✅ Successfully pushed to main!"
            exit 0
          fi
          
          # Try master branch as fallback
          if git push origin master 2>&1; then
            echo "✅ Successfully pushed to master!"
            exit 0
          fi
          
          # If not last attempt, sync and retry
          if [ $retry_count -lt $max_retries ]; then
            echo "⏳ Retrying in 10 seconds..."
            sleep 10
            echo "🔄 Syncing again..."
            git pull --rebase origin main 2>&1 || git pull --rebase origin master 2>&1 || true
          fi
        done
        
        # All retries failed
        echo "❌ Failed to push after $max_retries attempts"
        exit 1
    
    # Optional: Upload as backup
    - name: Upload predictions as backup
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: predictions-${{ github.run_number }}
        path: |
          live.csv
          extracted_features_complete.csv
          predictions_output.csv
        retention-days: 7
